<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>MindVault-AI | Sign In</title><script src="https://cdn.tailwindcss.com"></script><script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"><style>@import url('https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&f[]=satoshi@300,400,500,700&display=swap');:root {--bg-deep: #0a0e27;--accent-blue: #0ea5e9;--accent-purple: #a855f7;--glass: rgba(15, 23, 42, 0.6);}* { cursor: none !important; }body { font-family: 'General Sans', sans-serif; background: var(--bg-deep); overflow: hidden; }.mesh-gradient { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, rgba(14, 165, 233, 0.15) 0%, transparent 50%), radial-gradient(circle at 80% 20%, rgba(168, 85, 247, 0.1) 0%, transparent 40%), radial-gradient(circle at 20% 80%, rgba(168, 85, 247, 0.08) 0%, transparent 40%); filter: blur(100px); animation: rotate-mesh 20s linear infinite alternate; z-index: -1; }.ray { position: fixed; width: 100vw; height: 2px; background: linear-gradient(90deg, transparent, rgba(14, 165, 233, 0.3), transparent); transform: rotate(-45deg); pointer-events: none; z-index: -1; }.glass-card { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.02); animation: float 8s ease-in-out infinite, breathe 4s ease-in-out infinite; }.custom-cursor { position: fixed; width: 400px; height: 400px; background: radial-gradient(circle, rgba(14, 165, 233, 0.1) 0%, transparent 70%); pointer-events: none; transform: translate(-50%, -50%); z-index: 9999; transition: width 0.3s, height 0.3s; }.cursor-dot { position: fixed; width: 8px; height: 8px; background: #fff; border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); z-index: 10000; box-shadow: 0 0 15px #0ea5e9; }.floating-label { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none; }.input-group input:focus ~ .floating-label, .input-group input:not(:placeholder-shown) ~ .floating-label { transform: translateY(-24px) scale(0.85); color: var(--accent-blue); }.input-glow:focus { box-shadow: 0 0 25px rgba(14, 165, 233, 0.2), inset 0 0 10px rgba(14, 165, 233, 0.05); border-color: rgba(14, 165, 233, 0.5); outline: 2px solid rgba(14, 165, 233, 0.2); outline-offset: 4px; }.pulse-btn { position: relative; overflow: hidden; }.pulse-btn::after { content: ''; position: absolute; inset: 0; background: linear-gradient(45deg, var(--accent-blue), var(--accent-purple)); opacity: 0; transition: opacity 0.3s; z-index: -1; }.pulse-btn:hover::after { opacity: 1; }@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }@keyframes rotate-mesh { 0% { transform: translate(0%, 0%) rotate(0deg); } 100% { transform: translate(-10%, -10%) rotate(10deg); } } @keyframes breathe { 0%, 100% { border-color: rgba(255,255,255,0.08); } 50% { border-color: rgba(14, 165, 233, 0.2); } } @keyframes scan { 0% { top: -10%; } 100% { top: 110%; } }.neural-bg { position: fixed; inset: 0; z-index: -2; opacity: 0.4; }</style></head><body><div class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden"><div class="mesh-gradient" id="mesh"></div><div class="neural-bg" id="neural-canvas"></div><div class="ray top-0 left-0 opacity-20"></div><div class="custom-cursor" id="cursor-blur"></div><div class="cursor-dot" id="cursor-dot"></div><div class="w-full max-w-[420px] glass-card rounded-[32px] p-10 relative z-10 transition-all duration-500 ease-out" id="login-card"><div class="flex flex-col items-center mb-10 text-center"><div class="w-14 h-14 rounded-2xl bg-gradient-to-tr from-[#0ea5e9] to-[#a855f7] flex items-center justify-center mb-6 shadow-lg shadow-blue-500/20"><iconify-icon icon="lucide:brain-circuit" class="text-3xl text-white"></iconify-icon></div><h1 class="text-3xl font-semibold text-white tracking-tight mb-2">MindVault AI</h1><p class="text-slate-400 text-sm font-light">Access your organizational memory</p></div><form class="space-y-6" onsubmit="return false"><div class="input-group relative"><input type="email" id="email" placeholder=" " class="w-full bg-slate-900/50 border border-slate-800 rounded-xl px-4 py-3.5 text-slate-200 outline-none input-glow transition-all duration-300 peer"><label for="email" class="floating-label absolute left-4 top-3.5 text-slate-500 text-sm">Email Address</label></div><div class="input-group relative"><input type="password" id="password" placeholder=" " class="w-full bg-slate-900/50 border border-slate-800 rounded-xl px-4 py-3.5 text-slate-200 outline-none input-glow transition-all duration-300 peer"><label for="password" class="floating-label absolute left-4 top-3.5 text-slate-500 text-sm">Password</label><button type="button" class="absolute right-4 top-3.5 text-slate-500 hover:text-white transition-colors"><iconify-icon icon="lucide:eye" class="text-lg"></iconify-icon></button></div><div class="flex justify-end"><a href="#" id="nav-forgot-password" class="text-xs text-slate-400 hover:text-sky-400 transition-colors">Forgot password?</a></div><button id="cta-login-btn" class="pulse-btn magnetic-target group relative w-full py-4 rounded-xl bg-gradient-to-r from-[#0ea5e9] to-[#a855f7] text-white font-semibold text-sm shadow-2xl shadow-blue-500/30 transition-all active:scale-[0.98] overflow-hidden"><span class="relative z-10">Sign In</span><div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div></button><div class="relative py-4 flex items-center"><div class="flex-grow border-t border-slate-800"></div><span class="px-4 text-[10px] uppercase tracking-widest text-slate-600">or continue with</span><div class="flex-grow border-t border-slate-800"></div></div><button id="cta-google-btn" class="group w-full py-3.5 rounded-xl border border-slate-800 bg-transparent hover:bg-slate-800/50 text-slate-300 font-medium text-sm flex items-center justify-center gap-3 transition-all focus:outline-none focus:ring-2 focus:ring-slate-700"><iconify-icon icon="logos:google-icon" class="text-lg transition-transform duration-500 group-hover:rotate-[360deg] group-hover:scale-110"></iconify-icon>Google Account</button></form><p class="mt-10 text-center text-slate-500 text-xs">Don't have an account? <a href="#" id="nav-register-link" class="text-sky-400 hover:text-sky-300 font-medium ml-1">Create Workspace</a></p></div></div><script>const cursorBlur = document.getElementById('cursor-blur');const cursorDot = document.getElementById('cursor-dot');const card = document.getElementById('login-card');const mesh = document.getElementById('mesh');document.addEventListener('mousemove', (e) => {gsap.to(cursorBlur, { x: e.clientX, y: e.clientY, duration: 0.6, ease: 'power2.out' });gsap.to(cursorDot, { x: e.clientX, y: e.clientY, duration: 0.1, ease: 'power2.out' });const xRotation = (e.clientY - window.innerHeight / 2) / 40;const yRotation = (e.clientX - window.innerWidth / 2) / 40;gsap.to(card, { rotationX: -xRotation, rotationY: yRotation, duration: 0.5, ease: 'power1.out' });});document.querySelectorAll('input').forEach(input => { input.addEventListener('click', (e) => { const ripple = document.createElement('div'); ripple.className = 'absolute bg-white/10 rounded-full pointer-events-none transform -translate-x-1/2 -translate-y-1/2'; const rect = input.getBoundingClientRect(); ripple.style.left = `${e.clientX - rect.left}px`; ripple.style.top = `${e.clientY - rect.top}px`; ripple.style.width = ripple.style.height = '0px'; input.parentElement.appendChild(ripple); gsap.to(ripple, { width: 300, height: 300, opacity: 0, duration: 0.6, onComplete: () => ripple.remove() }); }); }); const magneticButtons = document.querySelectorAll('.magnetic-target');magneticButtons.forEach(btn => {btn.addEventListener('mousemove', (e) => {const rect = btn.getBoundingClientRect();const x = e.clientX - rect.left - rect.width / 2;const y = e.clientY - rect.top - rect.height / 2;gsap.to(btn, { x: x * 0.3, y: y * 0.3, duration: 0.3, ease: 'power2.out' });gsap.to(cursorBlur, { width: 150, height: 150, duration: 0.3 });});btn.addEventListener('mouseleave', () => {gsap.to(btn, { x: 0, y: 0, duration: 0.5, ease: 'elastic.out(1, 0.3)' });gsap.to(cursorBlur, { width: 400, height: 400, duration: 0.3 });});});const canvas = document.createElement('canvas');document.getElementById('neural-canvas').appendChild(canvas);const ctx = canvas.getContext('2d');let particles = [];function initCanvas() {canvas.width = window.innerWidth;canvas.height = window.innerHeight;particles = [];for (let i = 0; i < 60; i++) {particles.push({x: Math.random() * canvas.width,y: Math.random() * canvas.height,size: Math.random() * 2,vx: (Math.random() - 0.5) * 0.5,vy: (Math.random() - 0.5) * 0.5});}}function animateParticles() {ctx.clearRect(0, 0, canvas.width, canvas.height);particles.forEach((p, i) => {p.x += p.vx;p.y += p.vy;if (p.x < 0 || p.x > canvas.width) p.vx *= -1;if (p.y < 0 || p.y > canvas.height) p.vy *= -1;ctx.beginPath();ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);ctx.fillStyle = i % 2 === 0 ? '#0ea5e9' : '#a855f7';ctx.fill();particles.forEach((p2, j) => {const dx = p.x - p2.x;const dy = p.y - p2.y;const dist = Math.sqrt(dx * dx + dy * dy);if (dist < 150) {ctx.beginPath();ctx.moveTo(p.x, p.y);ctx.lineTo(p2.x, p2.y);ctx.strokeStyle = `rgba(168, 85, 247, ${0.1 * (1 - dist / 150)})`;ctx.lineWidth = 0.5;ctx.stroke();}});});requestAnimationFrame(animateParticles);}window.addEventListener('resize', initCanvas);initCanvas();animateParticles();gsap.from(".glass-card", { opacity: 0, scale: 0.95, y: 40, duration: 1.2, ease: "power4.out" });gsap.from(".mesh-gradient", { opacity: 0, duration: 2, ease: "power2.inOut" });</script></body></html>
