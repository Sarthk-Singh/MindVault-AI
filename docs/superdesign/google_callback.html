fying your identity with Google</p></div><div class="bg-slate-900/40 rounded-2xl p-6 border border-slate-800/50 mb-8 flex items-center gap-4 transition-opacity duration-500 opacity-0" id="account-preview"><div class="w-12 h-12 rounded-full overflow-hidden border-2 border-sky-500/30"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Avatar" class="w-full h-full object-cover"></div><div class="flex-1 text-left"><p class="text-white font-medium text-sm">Sarah Jenkins</p><p class="text-slate-500 text-xs">sarah.j@company.com</p></div><div class="flex items-center gap-1 bg-emerald-500/10 text-emerald-400 px-2 py-1 rounded-full text-[10px] font-semibold uppercase tracking-wider"><iconify-icon icon="lucide:check-circle" class="text-xs"></iconify-icon>Verified</div></div><div class="space-y-4"><div class="flex items-center gap-4 group" id="step-1"><div class="w-6 h-6 rounded-full border border-slate-700 flex items-center justify-center text-[10px] text-slate-500 transition-colors" id="indicator-1">1</div><span class="text-sm text-slate-500 transition-colors" id="text-1">Authenticating with Google</span></div><div class="flex items-center gap-4" id="step-2"><div class="w-6 h-6 rounded-full border border-slate-700 flex items-center justify-center text-[10px] text-slate-500 transition-colors" id="indicator-2">2</div><span class="text-sm text-slate-500 transition-colors" id="text-2">Synchronizing MindVault profile</span></div><div class="flex items-center gap-4" id="step-3"><div class="w-6 h-6 rounded-full border border-slate-700 flex items-center justify-center text-[10px] text-slate-500 transition-colors" id="indicator-3">3</div><span class="text-sm text-slate-500 transition-colors" id="text-3">Linking organizational workspace</span></div></div><div class="mt-10 flex justify-center"><div class="px-4 py-2 rounded-full bg-slate-900/80 border border-slate-800 text-[10px] text-slate-500 uppercase tracking-widest flex items-center gap-2"><span class="w-1 h-1 rounded-full bg-sky-400 animate-pulse"></span>Encrypted Handshake in Progress</div></div></div></div><script>const cursorBlur = document.getElementById('cursor-blur');const cursorDot = document.getElementById('cursor-dot');const card = document.getElementById('auth-card');document.addEventListener('mousemove', (e) => {gsap.to(cursorBlur, { x: e.clientX, y: e.clientY, duration: 0.6, ease: 'power2.out' });gsap.to(cursorDot, { x: e.clientX, y: e.clientY, duration: 0.1, ease: 'power2.out' });const xRotation = (e.clientY - window.innerHeight / 2) / 60;const yRotation = (e.clientX - window.innerWidth / 2) / 60;gsap.to(card, { rotationX: -xRotation, rotationY: yRotation, duration: 0.5, ease: 'power1.out' });});const canvas = document.createElement('canvas');document.getElementById('neural-canvas').appendChild(canvas);const ctx = canvas.getContext('2d');let particles = [];function initCanvas() {canvas.width = window.innerWidth;canvas.height = window.innerHeight;particles = [];for (let i = 0; i < 40; i++) {particles.push({x: Math.random() * canvas.width,y: Math.random() * canvas.height,size: Math.random() * 1.5,vx: (Math.random() - 0.5) * 0.3,vy: (Math.random() - 0.5) * 0.3});}}function animateParticles() {ctx.clearRect(0, 0, canvas.width, canvas.height);particles.forEach((p, i) => {p.x += p.vx;p.y += p.vy;if (p.x < 0 || p.x > canvas.width) p.vx *= -1;if (p.y < 0 || p.y > canvas.height) p.vy *= -1;ctx.beginPath();ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);ctx.fillStyle = i % 2 === 0 ? '#0ea5e9' : '#a855f7';ctx.fill();particles.forEach((p2, j) => {const dx = p.x - p2.x;const dy = p.y - p2.y;const dist = Math.sqrt(dx * dx + dy * dy);if (dist < 180) {ctx.beginPath();ctx.moveTo(p.x, p.y);ctx.lineTo(p2.x, p2.y);ctx.strokeStyle = `rgba(168, 85, 247, ${0.08 * (1 - dist / 180)})`;ctx.lineWidth = 0.5;ctx.stroke();}});});requestAnimationFrame(animateParticles);}initCanvas();animateParticles();const steps = [ { indicator: 'indicator-1', text: 'text-1', heading: 'Authenticating...', subtext
